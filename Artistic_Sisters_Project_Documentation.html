# Artistic Sisters
## Enterprise Platform — Project Architecture & Implementation Documentation

<div class="meta-box">
<strong>Version:</strong> 1.0 &nbsp;|&nbsp; <strong>Date:</strong> 14-Apr-2026 &nbsp;|&nbsp; <strong>Status:</strong> Final Submission
</div>

## 1. Executive Summary

**Artistic Sisters** is a premium multi-role B2C marketplace and commissioned artworks portal. Customers can browse a curated gallery, place standard orders, and submit custom commission requests directly to artists. Artists manage their portfolio and approve commission inquiries. Delivery Agents are assigned automatically via an event-driven logistics pipeline and update tracking in real time.

The system is built on a modern **microservices architecture** with a .NET 10 backend, Angular 21 frontend, and RabbitMQ-powered event bus.

### Core Technology Pillars
- **Frontend**: Angular 21 (standalone components, reactive forms, role-based routing)
- **Backend**: .NET 10 microservices using Clean Architecture and CQRS (MediatR)
- **Persistence**: SQL Server — one isolated database per service
- **Messaging**: RabbitMQ via MassTransit for all cross-service integration events
- **Cache/State**: StackExchange.Redis (used in OrderService for reservation state)
- **Payments**: Razorpay SDK integrated in PaymentService
- **Security**: JWT Bearer tokens + BCrypt password hashing

### Primary Actor Groups
| Role | Description |
| :--- | :--- |
| **Customer** | Browses gallery, places orders, tracks shipments, requests commissions |
| **Artist** | Manages gallery uploads, reviews commission inquiries, updates order status |
| **DeliveryAgent** | Receives assigned shipments, updates delivery milestones |

## 7. Backend Low-Level Design (LLD)

### 7.1 Clean Architecture — Internal Layering Pattern

Every microservice strictly adheres to Clean Architecture to ensure separation of concerns:

```mermaid
graph LR
    API[API Layer\nControllers] -->|Request DTOs| App[Application Layer\nMediatR Handlers]
    App -->|Commands / Queries| Dom[Domain Layer\nEntities & Enums]
    App -->|IRepository calls| Infra[Infrastructure Layer\nEF Core & Messaging]
    Infra -->|Implements| Dom

    subgraph "Per-Service Internal Stack"
        API
        App
        Dom
        Infra
    end
```

| Layer | Responsibilities |
| :--- | :--- |
| **API** | HTTP Controllers, request binding, JWT role gates |
| **Application** | MediatR Commands/Queries, FluentValidation, business orchestration |
| **Domain** | Core Entities, Enums (e.g. `OrderStatus`), domain invariants |
| **Infrastructure** | DbContext, EF migrations, MassTransit publish, Redis client |

### 7.2 Request Processing Pipeline

When an API call arrives, it passes through this ordered chain:

1. **Ocelot Gateway** — incoming request matched to a downstream route via `ocelot.json`
2. **JWT Middleware** — token validated, role claims extracted
3. **Controller** — request bound and dispatched via `IMediator.Send()`
4. **MediatR Handler** — business logic executed, domain entities updated
5. **EF Core SaveChanges** — persisted to SQL Server
6. **Event Publishing** — MassTransit publishes integration event to RabbitMQ (if needed)
7. **HTTP Response** — result returned to client

### 7.3 Shared Library (`Artistic_Sisters.Shared`)
The shared project provides:
- **Integration Event DTOs**: All event message contracts shared across producers and consumers
- **Shared DTOs**: `OrderDto` and other cross-service data transfer objects

## 9. Event-Driven Architecture

### 9.1 Integration Event Inventory
All events are published via MassTransit to RabbitMQ and consumed by the NotificationService (emails) and other services (logistics, payment).

| Event | Published By | Consumed By | Side Effect |
| :--- | :--- | :--- | :--- |
| `CustomerRegisteredEvent` | IdentityService | NotificationService | Welcome email to customer |
| `CustomerApprovedEvent` | IdentityService | NotificationService | Approval email |
| `DeliveryAgentRegisteredEvent` | IdentityService | NotificationService | Agent welcome email |
| `CustomCommissionEvent` | OrderService | NotificationService | Commission inquiry email to artist |
| `OrderPlacedEvent` | OrderService | PaymentService, NotificationService | Triggers payment flow + confirmation email |
| `ReadyForDispatchEvent` | OrderService | LogisticsService, PaymentService | Creates shipment, triggers agent assignment |
| `DispatchConfirmedEvent` | LogisticsService | NotificationService, PaymentService | Dispatch confirmation email |
| `AgentAssignedEvent` | LogisticsService | NotificationService, PaymentService | Agent assigned email to customer |
| `AssignAgentFailedEvent` | LogisticsService | PaymentService | Handles failed assignment logic |
| `SLAAtRiskEvent` | LogisticsService | NotificationService | SLA breach warning email |
| `OrderStatusChangedEvent` | OrderService | NotificationService | Status update email to customer, agent, admin |
| `DeliveryCompletedEvent` | LogisticsService | NotificationService | Delivery confirmation email |

### 9.2 MassTransit Outbox Pattern (OrderService)
OrderService uses a transactional **Outbox** pattern to guarantee at-least-once delivery:

```mermaid
sequenceDiagram
    participant H as MediatR Handler
    participant DB as SQL Server
    participant OUT as OutboxMessages
    participant POLL as OutboxProcessor
    participant RMQ as RabbitMQ
    participant CS as Consumer Services

    H->>DB: Save Order + OutboxMessage (same transaction)
    POLL->>OUT: Poll for unprocessed messages
    POLL->>RMQ: Publish event
    RMQ->>CS: Route to Consumer queues
```

### 10.2 Core Use Case Narratives

#### UC 10.2.1 — Place Standard Order
- **Actor**: Customer
- **Preconditions**: User logged in with `Customer` role. Artwork is available.
- **Flow**:
  1. Customer selects artwork and proceeds to checkout.
  2. Frontend calls `POST /api/orders` via OrderService.
  3. OrderService creates the order and publishes `OrderPlacedEvent`.
  4. PaymentService consumes the event to initiate Razorpay flow.
  5. NotificationService sends order confirmation email.
- **Postconditions**: Order record persisted, customer notified.

#### UC 10.2.2 — Request Custom Commission
- **Actor**: Customer
- **Preconditions**: User logged in.
- **Flow**:
  1. Customer fills the commission form (medium, size, reference photo, description).
  2. Frontend calls `POST /api/orders/commission`.
  3. OrderService creates a commission record; publishes `CustomCommissionEvent`.
  4. Artist receives an email notification to review.
- **Postconditions**: Commission visible in Artist dashboard and Customer's order history.

#### UC 10.2.3 — Delivery Fulfillment
- **Actor**: Delivery Agent
- **Flow**:
  1. Agent logs in via `/auth/login`, token read as `DeliveryAgent` role.
  2. Agent browses assigned shipments on the Delivery Dashboard.
  3. Agent updates status through milestones (`OutForDelivery` → `Delivered`).
  4. Each update triggers `OrderStatusChangedEvent` → NotificationService emails customer.
- **Postconditions**: Order closed, customer receives delivery confirmation.

## 11. Data Architecture and ER Diagrams

### 11.1 Order Lifecycle — State Machine Diagram
Based on the actual `OrderStatus` enum in `OrderService.Domain.Enums`:

```mermaid
stateDiagram-v2
    [*] --> Pending : Order Created
    Pending --> Confirmed : Payment Received
    Confirmed --> InProduction : Artist Begins Work
    InProduction --> ReadyForDelivery : Work Completed
    ReadyForDelivery --> OutForDelivery : Agent Dispatched
    OutForDelivery --> Delivered : Agent Marks Complete
    Pending --> Cancelled : Admin or User Action
    Confirmed --> Cancelled : System Rollback
    Delivered --> [*]
    Cancelled --> [*]
```

- **OrderService** owns: `Orders`, `OrderItems`, `OutboxMessages`
- **LogisticsService** owns: `Assignments`, `Agents`, `Vehicles`, `DispatchSagas`
- **PaymentService** owns: `Payments` (Razorpay transactions)
- **NotificationService** owns: Integration logs and inbox history

## 13. Core Business Flow Diagrams

### 13.1 Authentication and JWT Guard Verification

```mermaid
sequenceDiagram
    participant User
    participant Angular
    participant Gateway
    participant Identity

    User->>Angular: Submit login credentials
    Angular->>Gateway: POST /api/auth/login
    Gateway->>Identity: Forward request
    Identity->>Identity: BCrypt.Verify password
    Identity-->>Angular: { token, role, userId }
    Angular->>Angular: Store in localStorage (as_token, as_role, as_userId)
    User->>Angular: Navigate to /artist
    Angular->>Angular: artistGuard checks role == "Artist"
    Angular-->>User: Render Artist Dashboard
```

### 13.2 Order-to-Delivery Sequence Flow

```mermaid
sequenceDiagram
    participant C as Customer
    participant G as Gateway
    participant O as OrderService
    participant P as PaymentService
    participant L as LogisticsService
    participant R as RabbitMQ
    participant N as NotificationService

    C->>G: POST /api/orders
    G->>O: Place Order
    O->>O: Create Order (Pending)
    O->>R: Publish OrderPlacedEvent
    O-->>C: Order Created

    R->>P: Consume OrderPlacedEvent
    P->>P: Create Razorpay Order

    Note over O: Admin updates status
    O->>R: Publish ReadyForDispatchEvent
    R->>L: Consume ReadyForDispatch
    L->>L: Create Shipment, Assign Agent
    L->>R: Publish AgentAssignedEvent
    R->>N: Consume AgentAssigned
    N-->>C: Email: Agent Assigned

    L->>R: Publish OrderStatusChangedEvent
    R->>N: Consume StatusChanged
    N-->>C: Email: Out for Delivery
```

### 13.3 Custom Commission Handshake Flow

```mermaid
sequenceDiagram
    participant C as Customer
    participant O as OrderService
    participant R as RabbitMQ
    participant N as NotificationService
    participant A as Artist

    C->>O: POST /api/orders/commission
    O->>O: Save Commission Record
    O->>R: Publish CustomCommissionEvent
    R->>N: Consume CustomCommission
    N-->>A: Email: New Commission Request

    A->>O: Review and Update Status (InProduction)
    O->>R: Publish OrderStatusChangedEvent
    R->>N: Consume StatusChanged
    N-->>C: Email: Commission Status Updated
```

## 15. Security

### 15.1 Authentication Model
- **JWT Bearer Tokens**: Issued by IdentityService. Each token payload contains `userId`, `email`, and `role` claims.
- **BCrypt Password Hashing**: All passwords are hashed and salted using `BCrypt.Net-Next` before storage.
- **Token Storage**: The Angular frontend stores JWT in `localStorage` under key `as_token`.

### 15.2 Role-Based Authorization
- Four guards enforce role checks client-side: `authGuard`, `artistGuard`, `deliveryGuard`, `adminGuard`.
- Server-side, services validate the JWT on incoming requests via middleware.
